<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FBBF24" />
    <meta name="description" content="Dev Amit: Premium architectural portfolio showcasing high-end residential, minimalist commercial, and sustainable urban designs. Redefining modern living with bespoke spatial solutions." />
    <meta name="keywords" content="Architect, Architecture Portfolio, Luxury Design, Minimalist Architecture, Sustainable Building, Dev Amit" />
    
    <!-- PWA & Mobile Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <!-- Modern Fallback -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aura-portfolio.web.app/" />
    <meta property="og:title" content="Dev Amit | Premium Architectural Portfolio" />
    <meta property="og:description" content="Explore bespoke, high-end architectural masterpieces by Dev Amit. Minimalist luxury for the modern era." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200&h=630&auto=format&fit=crop" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aura-portfolio.web.app/" />
    <meta property="twitter:title" content="Dev Amit | Premium Architectural Portfolio" />
    <meta property="twitter:description" content="Explore bespoke, high-end architectural masterpieces by Dev Amit. Minimalist luxury for the modern era." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200&h=630&auto=format&fit=crop" />

    <!-- JSON-LD Structured Data for AEO/GEO/SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Architect",
      "name": "Dev Amit",
      "image": "/logo.png",
      "description": "High-end architectural services specializing in minimalist and luxury residential designs.",
      "url": "https://aura-portfolio.web.app/",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Global",
        "addressCountry": "IN"
      },
      "award": "Excellence in Minimalist Design 2025",
      "knowsAbout": ["Sustainable Architecture", "Luxury Residential Design", "Urban Planning"],
      "potentialAction": {
        "@type": "ConsultAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://aura-portfolio.web.app/#contact"
        }
      }
    }
    </script>

    <title>Aura Architect | Premium Architectural Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
